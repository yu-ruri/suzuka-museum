<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ぼくの作品展</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🎨 すずかの作品展</h1>
    <p>ようこそ！ゆっくり見ていってね</p>
  </header>

  <!-- ギャラリー -->
  <section class="gallery">
    <img src="images/pic1.jpg" onclick="openModal(this.src)">
    <img src="images/pic2.jpg" onclick="openModal(this.src)">
    <img src="images/pic3.jpg" onclick="openModal(this.src)">
  </section>

  <!-- 音楽 -->
  <section class="music">
    <h2>🎵 音楽コーナー</h2>
    <iframe width="853" height="480" 
    src="https://www.youtube.com/embed/4nT0EdjB3w8
    " title="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </section>

  <!-- モーダル -->
  <div id="modal" onclick="closeModal()">
    <img id="modalImg">
  </div>

  <script src="script.js"></script>

</body>
</html>
